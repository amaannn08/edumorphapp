name: shiksha_verse
description: Shiksha Verse — Minimalist EdTech app for lecture reels, shorts, and quiz battles.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.6.3

  # HTTP client for backend API
  http: ^1.2.2

  # Fonts
  google_fonts: ^6.2.1

  # Network images with caching
  cached_network_image: ^3.4.1

  # OTP pin input
  pinput: ^5.0.0

  # Animations
  animate_do: ^3.3.4

  # Smooth page indicator (for onboarding dots)
  smooth_page_indicator: ^1.2.0+3

  # Cupertino icons
  cupertino_icons: ^1.0.8

  # Video player
  video_player: ^2.9.2
  chewie: ^1.8.5

  # Date/number formatting
  intl: ^0.19.0

  # Declarative animations
  flutter_animate: ^4.5.0

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Shared preferences (for token persistence)
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
