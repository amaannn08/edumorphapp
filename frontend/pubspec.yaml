name: shiksha_verse
description: Shiksha Verse — Minimalist EdTech app for lecture reels, shorts, and quiz battles.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.6.3

  # HTTP client for backend API
  http: ^1.2.2

  # Fonts
  google_fonts: ^6.2.1

  # Network images with caching
  cached_network_image: ^3.4.1

  # OTP pin input
  pinput: ^5.0.0

  # Animations
  animate_do: ^3.3.4

  # Smooth page indicator (for onboarding dots)
  smooth_page_indicator: ^1.2.0+3

  # Cupertino icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
