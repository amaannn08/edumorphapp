name: Build iOS App

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'   # Only trigger when Flutter code changes
  workflow_dispatch:    # Manual trigger from GitHub UI

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest   # ← Apple-silicon Mac provided by GitHub

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Install CocoaPods
        working-directory: frontend/ios
        run: pod install

      - name: Analyze
        working-directory: frontend
        run: flutter analyze

      # ── Option A: Build unsigned IPA (no Apple account needed) ──────────────
      # Good for: testing the build works, distributing via AltStore / sideload
      - name: Build iOS (no code signing)
        working-directory: frontend
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=BACKEND_URL=${{ secrets.BACKEND_URL }}

      - name: Package unsigned IPA
        run: |
          mkdir -p /tmp/Payload
          cp -r frontend/build/ios/iphoneos/Runner.app /tmp/Payload/
          cd /tmp && zip -r ShikshaVerse-unsigned.ipa Payload/
          mv /tmp/ShikshaVerse-unsigned.ipa $GITHUB_WORKSPACE/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShikshaVerse-iOS-unsigned
          path: ShikshaVerse-unsigned.ipa
          retention-days: 30

